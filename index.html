<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        margin: 0;
        padding: 24px;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
        background: #fff;
        border-radius: 10px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      form {
        display: grid;
        grid-template-columns: 1fr 140px 140px auto;
        gap: 10px;
        margin-bottom: 20px;
      }

      input,
      select,
      button {
        padding: 10px;
        border: 1px solid #ccd3e0;
        border-radius: 6px;
        font-size: 14px;
      }

      button {
        cursor: pointer;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }

      .card {
        background: #f8faff;
        border: 1px solid #e1e7f5;
        border-radius: 8px;
        padding: 12px;
      }

      .card strong {
        display: block;
        font-size: 13px;
        color: #44506b;
      }

      .value {
        margin-top: 6px;
        font-size: 20px;
      }

      ul {
        padding: 0;
        margin: 0;
        list-style: none;
      }

      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #edf1f8;
        padding: 10px 0;
      }

      .transaction-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .amount-income {
        color: #0b8f43;
      }

      .amount-expense {
        color: #bc1622;
      }

      .empty {
        color: #66738f;
      }

      .form-error {
        margin: 0 0 12px;
        color: #bc1622;
        font-size: 14px;
      }

      @media (max-width: 700px) {
        form {
          grid-template-columns: 1fr;
        }

        .summary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Finance App</h1>
      <form id="transaction-form">
        <input id="description" type="text" placeholder="Description" aria-label="Transaction description" required />
        <input
          id="amount"
          type="number"
          step="0.01"
          min="0.01"
          placeholder="Amount"
          aria-label="Transaction amount"
          required
        />
        <select id="type" aria-label="Transaction type" required>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <button type="submit" aria-label="Add transaction">Add</button>
      </form>
      <p id="form-error" class="form-error" hidden></p>

      <section class="summary">
        <div class="card">
          <strong>Income</strong>
          <div id="income" class="value">$0.00</div>
        </div>
        <div class="card">
          <strong>Expenses</strong>
          <div id="expenses" class="value">$0.00</div>
        </div>
        <div class="card">
          <strong>Balance</strong>
          <div id="balance" class="value">$0.00</div>
        </div>
      </section>

      <ul id="transactions"></ul>
    </main>

    <script>
      const STORAGE_KEY = "finance-app-transactions";
      const form = document.getElementById("transaction-form");
      const descriptionInput = document.getElementById("description");
      const amountInput = document.getElementById("amount");
      const typeInput = document.getElementById("type");
      const transactionsList = document.getElementById("transactions");
      const incomeValue = document.getElementById("income");
      const expensesValue = document.getElementById("expenses");
      const balanceValue = document.getElementById("balance");
      const formError = document.getElementById("form-error");
      let fallbackIdCounter = 0;

      const formatCurrency = (value) =>
        new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(value);

      const createId = () => {
        if (typeof crypto !== "undefined") {
          if (typeof crypto.randomUUID === "function") {
            return crypto.randomUUID();
          }
          if (typeof crypto.getRandomValues === "function") {
            const values = new Uint32Array(2);
            crypto.getRandomValues(values);
            return `${values[0]}-${values[1]}-${Date.now()}`;
          }
        }
        fallbackIdCounter += 1;
        return `${Date.now()}-${fallbackIdCounter}`;
      };

      const loadTransactions = () => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          console.warn("Unable to load saved transactions from localStorage.");
          return [];
        }
      };

      let transactions = loadTransactions();

      const saveTransactions = () => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
        } catch {
          console.warn("Unable to save transactions to localStorage.");
        }
      };

      const render = () => {
        transactionsList.innerHTML = "";

        if (transactions.length === 0) {
          const empty = document.createElement("li");
          empty.className = "empty";
          empty.textContent = "No transactions yet.";
          transactionsList.appendChild(empty);
        } else {
          transactions.forEach((entry) => {
            const item = document.createElement("li");
            const text = document.createElement("span");
            const amount = document.createElement("span");
            const remove = document.createElement("button");

            text.textContent = entry.description;
            amount.textContent = `${entry.type === "expense" ? "-" : "+"} ${formatCurrency(entry.amount)}`;
            amount.className = entry.type === "expense" ? "amount-expense" : "amount-income";

            remove.type = "button";
            remove.textContent = "Remove";
            remove.setAttribute("aria-label", `Remove ${entry.description}`);
            remove.addEventListener("click", () => {
              transactions = transactions.filter((candidate) => candidate.id !== entry.id);
              saveTransactions();
              render();
            });

            const right = document.createElement("div");
            right.className = "transaction-actions";
            right.appendChild(amount);
            right.appendChild(remove);

            item.appendChild(text);
            item.appendChild(right);
            transactionsList.appendChild(item);
          });
        }

        const totals = transactions.reduce(
          (acc, entry) => {
            if (entry.type === "income") {
              acc.income += entry.amount;
            } else {
              acc.expenses += entry.amount;
            }
            return acc;
          },
          { income: 0, expenses: 0 }
        );

        incomeValue.textContent = formatCurrency(totals.income);
        expensesValue.textContent = formatCurrency(totals.expenses);
        balanceValue.textContent = formatCurrency(totals.income - totals.expenses);
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const description = descriptionInput.value.trim();
        const amount = Number(amountInput.value);
        const type = typeInput.value;
        const isValidType = type === "income" || type === "expense";

        if (!description || !Number.isFinite(amount) || amount <= 0 || !isValidType) {
          formError.textContent = "Please enter a description, valid amount, and transaction type.";
          formError.hidden = false;
          return;
        }

        formError.textContent = "";
        formError.hidden = true;
        transactions.push({
          id: createId(),
          description,
          amount,
          type,
        });

        saveTransactions();
        render();
        form.reset();
        descriptionInput.focus();
      });

      render();
    </script>
  </body>
</html>
